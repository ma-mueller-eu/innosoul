<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InnoSoul Consulting – Fördermittelberatung Life Science & MedTech</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="Team.jsx"></script>
<script type="text/babel" src="References.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: #F7FAFC; font-family: 'DM Sans', sans-serif; }

  /* Industries section (inline — small enough to not need its own file) */
  .industry-card {
    background: white;
    border-radius: 14px;
    padding: 32px 28px;
    box-shadow: 0 2px 16px rgba(26,34,56,0.08);
    transition: all 250ms ease;
    cursor: default;
  }
  .industry-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(26,34,56,0.13);
  }

  @media (max-width: 768px) {
    .desktop-grid { grid-template-columns: 1fr !important; }
    .contact-grid { grid-template-columns: 1fr !important; }
  }

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const IndustriesSection = () => {
  const industries = [
    {
      color: '#20C997',
      abbr: 'MT',
      title: 'MedTech',
      tags: ['Diagnostik', 'Medizinprodukte', 'Digital Health'],
      desc: 'Von der Diagnostik bis zu vernetzten Medizinprodukten – wir kennen die Regularien und die passenden Förderprogramme.',
    },
    {
      color: '#805AD5',
      abbr: 'BT',
      title: 'Biotechnologie',
      tags: ['Theranostik', 'Zelltherapie', 'Diagnostik'],
      desc: 'Theranostik, Zelltherapie, molekulare Diagnostik – wir sprechen die Sprache Ihrer Technologie.',
    },
    {
      color: '#1A2238',
      abbr: 'LS',
      title: 'Life Science',
      tags: ['Pharma', 'Klinische Tools', 'Forschungsplattformen'],
      desc: 'Von der Forschungsplattform bis zur klinischen Anwendung – mit dem richtigen Förderinstrument zur nächsten Stufe.',
    },
    {
      color: '#18B087',
      abbr: 'DH',
      title: 'Digital Health',
      tags: ['HealthTech', 'KI / Medizin', 'Software'],
      desc: 'KI-gestützte Diagnostik, klinische Entscheidungssoftware und Patientenplattformen – auch hier gibt es passende Programme.',
    },
  ];

  return (
    <section id="branchen" data-screen-label="Branchen" style={{ background: '#1A2238', padding: '96px 32px' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        <div style={{ textAlign: 'center', marginBottom: 56 }}>
          <div style={{ fontSize: 11, fontFamily: 'DM Sans', fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#20C997', marginBottom: 12 }}>Branchenfokus</div>
          <h2 style={{ fontFamily: 'DM Sans, sans-serif', fontSize: 'clamp(28px, 3.5vw, 42px)', fontWeight: 600, color: 'white', lineHeight: 1.2, marginBottom: 16 }}>
            Wir sprechen Ihre Sprache
          </h2>
          <p style={{ fontFamily: 'DM Sans', fontSize: 17, color: 'rgba(255,255,255,0.6)', lineHeight: 1.65, maxWidth: 520, margin: '0 auto' }}>
            Keine Generalisten. Tiefes Verständnis für die spezifischen Anforderungen jeder Branche.
          </p>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: 20 }}>
          {industries.map((ind, i) => (
            <div key={i} className="industry-card">
              <div style={{
                width: 48, height: 48, borderRadius: 12,
                background: ind.color, display: 'flex', alignItems: 'center', justifyContent: 'center',
                marginBottom: 16, opacity: 0.9,
              }}>
                <span style={{ fontFamily: 'DM Sans, sans-serif', fontWeight: 700, fontSize: 15, color: 'white' }}>{ind.abbr}</span>
              </div>
              <h3 style={{ fontFamily: 'DM Sans, sans-serif', fontSize: 19, fontWeight: 600, color: '#1A2238', marginBottom: 10 }}>{ind.title}</h3>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 12 }}>
                {ind.tags.map(t => (
                  <span key={t} style={{ fontSize: 10, fontFamily: 'DM Sans', fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: ind.color, background: ind.color + '15', borderRadius: 999, padding: '2px 9px' }}>{t}</span>
                ))}
              </div>
              <p style={{ fontFamily: 'DM Sans', fontSize: 13, lineHeight: 1.65, color: '#4A5568' }}>{ind.desc}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

const App = () => {
  const [currentSection, setCurrentSection] = useState('hero');

  const scrollToSection = (id) => {
    const el = document.getElementById(id);
    if (el) {
      const offset = 68;
      const top = el.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({ top, behavior: 'smooth' });
    }
    setCurrentSection(id);
  };

  // Track current section on scroll
  useEffect(() => {
    const sections = ['hero', 'leistungen', 'branchen', 'ueber-uns', 'referenzen', 'kontakt'];
    const observer = new IntersectionObserver(
      entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) setCurrentSection(entry.target.id);
        });
      },
      { rootMargin: '-40% 0px -55% 0px' }
    );
    sections.forEach(id => {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  const fonts = [
    { id: 'playfair', label: 'Playfair', cls: '' },
    { id: 'cormorant', label: 'Cormorant Garamond', cls: 'font-cormorant' },
    { id: 'dmserifdisplay', label: 'DM Serif Display', cls: 'font-dmserifdisplay' },
  ];
  const [activeFont, setActiveFont] = useState('playfair');

  const switchFont = (font) => {
    setActiveFont(font.id);
    document.body.className = font.cls;
  };

  return (
    <>
      <Header currentSection={currentSection} onNav={scrollToSection} />
      <main>
        <Hero onNav={scrollToSection} />
        <Services />
        <IndustriesSection />
        <Team />
        <References />
        <Contact />
      </main>
      <Footer onNav={scrollToSection} />
      <div className="font-switcher">
        <span style={{ fontSize: 10, fontFamily: 'DM Sans', color: 'rgba(255,255,255,0.3)', letterSpacing: '0.08em', textTransform: 'uppercase', padding: '7px 8px 7px 4px' }}>Schrift</span>
        {fonts.map(f => (
          <button key={f.id} className={`font-btn${activeFont === f.id ? ' active' : ''}`} onClick={() => switchFont(f)}>{f.label}</button>
        ))}
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
