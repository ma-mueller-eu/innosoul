<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--color-alabaster); font-family: var(--font-body); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .scale { display: flex; gap: 4px; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .step { flex: 1; height: 72px; display: flex; flex-direction: column; justify-content: flex-end; padding: 7px 5px; }
  .step-label { font-size: 10px; font-weight: 600; }
  .step-hex { font-family: var(--font-mono); font-size: 9px; margin-top: 2px; }
  .title { font-size: 10px; font-weight: 600; color: var(--fg-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
</style>
</head>
<body>
<div>
  <div class="title">Navy Scale</div>
  <div class="scale">
    <div class="step" style="background:#EEF0F5"><span class="step-label" style="color:#1A2238">50</span></div>
    <div class="step" style="background:#C5CBD9"><span class="step-label" style="color:#1A2238">100</span></div>
    <div class="step" style="background:#8C97B3"><span class="step-label" style="color:#1A2238">200</span></div>
    <div class="step" style="background:#5A6685"><span class="step-label" style="color:#fff">300</span></div>
    <div class="step" style="background:#2E3E5E"><span class="step-label" style="color:#fff">400</span></div>
    <div class="step" style="background:#1A2238; outline: 2px solid #20C997; outline-offset:-3px; border-radius:2px;"><span class="step-label" style="color:#fff">500 ★</span><span class="step-hex" style="color:rgba(255,255,255,0.6)">1A2238</span></div>
    <div class="step" style="background:#131929"><span class="step-label" style="color:#fff">600</span></div>
    <div class="step" style="background:#0C101A"><span class="step-label" style="color:#fff">700</span></div>
  </div>
</div>
<div>
  <div class="title">Lavender Scale</div>
  <div class="scale">
    <div class="step" style="background:#F3EEFF"><span class="step-label" style="color:#1A2238">50</span></div>
    <div class="step" style="background:#D9C9F5"><span class="step-label" style="color:#1A2238">100</span></div>
    <div class="step" style="background:#B399EA"><span class="step-label" style="color:#1A2238">200</span></div>
    <div class="step" style="background:#9B7ADF"><span class="step-label" style="color:#fff">300</span></div>
    <div class="step" style="background:#805AD5; outline: 2px solid #20C997; outline-offset:-3px; border-radius:2px;"><span class="step-label" style="color:#fff">400 ★</span><span class="step-hex" style="color:rgba(255,255,255,0.7)">805AD5</span></div>
    <div class="step" style="background:#6A47BB"><span class="step-label" style="color:#fff">500</span></div>
    <div class="step" style="background:#5435A0"><span class="step-label" style="color:#fff">600</span></div>
  </div>
</div>
</body>
</html>
