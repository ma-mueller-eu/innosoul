<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--color-alabaster); font-family: var(--font-body); padding: 20px; display: flex; flex-direction: column; gap: 18px; }
  .section-title { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 8px; }
  /* Spacing */
  .spacing-row { display: flex; align-items: center; gap: 10px; }
  .spacing-bar { height: 12px; background: var(--color-teal); border-radius: 2px; opacity: 0.75; }
  .spacing-label { font-size: 11px; color: var(--color-navy); font-weight: 600; min-width: 48px; }
  .spacing-px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  /* Radius */
  .radius-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .radius-box { width: 52px; height: 52px; background: var(--color-navy); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .radius-label { font-size: 9px; font-weight: 600; color: white; letter-spacing: 0.04em; }
  .radius-val { font-size: 9px; color: rgba(255,255,255,0.6); }
  /* Shadows */
  .shadow-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .shadow-box { width: 64px; height: 40px; background: white; border-radius: 8px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; }
  .shadow-name { font-size: 9px; font-weight: 600; color: var(--color-navy); }
</style>
</head>
<body>
  <div>
    <div class="section-title">Spacing Scale (4px base)</div>
    <div style="display:flex; flex-direction:column; gap:5px;">
      <div class="spacing-row"><div class="spacing-bar" style="width:4px"></div><div class="spacing-label">space-1</div><div class="spacing-px">4px</div></div>
      <div class="spacing-row"><div class="spacing-bar" style="width:8px"></div><div class="spacing-label">space-2</div><div class="spacing-px">8px</div></div>
      <div class="spacing-row"><div class="spacing-bar" style="width:16px"></div><div class="spacing-label">space-4</div><div class="spacing-px">16px</div></div>
      <div class="spacing-row"><div class="spacing-bar" style="width:24px"></div><div class="spacing-label">space-6</div><div class="spacing-px">24px</div></div>
      <div class="spacing-row"><div class="spacing-bar" style="width:32px"></div><div class="spacing-label">space-8</div><div class="spacing-px">32px</div></div>
      <div class="spacing-row"><div class="spacing-bar" style="width:48px"></div><div class="spacing-label">space-12</div><div class="spacing-px">48px</div></div>
      <div class="spacing-row"><div class="spacing-bar" style="width:80px"></div><div class="spacing-label">space-20</div><div class="spacing-px">80px</div></div>
    </div>
  </div>
  <div>
    <div class="section-title">Border Radius</div>
    <div class="radius-grid">
      <div class="radius-box" style="border-radius:4px"><span class="radius-label">xs</span><span class="radius-val">4px</span></div>
      <div class="radius-box" style="border-radius:6px"><span class="radius-label">sm</span><span class="radius-val">6px</span></div>
      <div class="radius-box" style="border-radius:8px"><span class="radius-label">md</span><span class="radius-val">8px</span></div>
      <div class="radius-box" style="border-radius:12px"><span class="radius-label">lg</span><span class="radius-val">12px</span></div>
      <div class="radius-box" style="border-radius:16px"><span class="radius-label">xl</span><span class="radius-val">16px</span></div>
      <div class="radius-box" style="border-radius:9999px; width:80px"><span class="radius-label">full</span><span class="radius-val">pill</span></div>
    </div>
  </div>
  <div>
    <div class="section-title">Elevation / Shadow</div>
    <div class="shadow-row">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div class="shadow-box" style="box-shadow:0 1px 3px rgba(26,34,56,0.06)"></div><span style="font-size:9px;color:#A0AEC0;">xs</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div class="shadow-box" style="box-shadow:0 2px 8px rgba(26,34,56,0.08)"></div><span style="font-size:9px;color:#A0AEC0;">sm</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div class="shadow-box" style="box-shadow:0 4px 16px rgba(26,34,56,0.10)"></div><span style="font-size:9px;color:#A0AEC0;">md</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div class="shadow-box" style="box-shadow:0 8px 32px rgba(26,34,56,0.14)"></div><span style="font-size:9px;color:#A0AEC0;">lg</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div class="shadow-box" style="box-shadow:0 16px 48px rgba(26,34,56,0.18)"></div><span style="font-size:9px;color:#A0AEC0;">xl</span></div>
    </div>
  </div>
</body>
</html>
