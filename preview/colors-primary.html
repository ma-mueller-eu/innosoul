<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--color-alabaster); font-family: var(--font-body); padding: 20px; }
  .swatches { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 90px; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .swatch-color { height: 80px; }
  .swatch-info { background: white; padding: 10px 12px; }
  .swatch-name { font-size: 11px; font-weight: 600; color: var(--color-navy); letter-spacing: 0.03em; }
  .swatch-hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-top: 2px; }
  .swatch-role { font-size: 10px; color: var(--fg-muted); margin-top: 3px; line-height: 1.3; }
</style>
</head>
<body>
<div class="swatches">
  <div class="swatch">
    <div class="swatch-color" style="background:#1A2238"></div>
    <div class="swatch-info">
      <div class="swatch-name">Deep Midnight Navy</div>
      <div class="swatch-hex">#1A2238</div>
      <div class="swatch-role">Headlines, Nav, Dark sections</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#20C997"></div>
    <div class="swatch-info">
      <div class="swatch-name">Bioluminescent Teal</div>
      <div class="swatch-hex">#20C997</div>
      <div class="swatch-role">CTA, Buttons, Accents</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#805AD5"></div>
    <div class="swatch-info">
      <div class="swatch-name">Electric Lavender</div>
      <div class="swatch-hex">#805AD5</div>
      <div class="swatch-role">Badges, Tags, Secondary</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#4A5568"></div>
    <div class="swatch-info">
      <div class="swatch-name">Slate Grey</div>
      <div class="swatch-hex">#4A5568</div>
      <div class="swatch-role">Body text, Sublines</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#F7FAFC; border-bottom: 1px solid #E2E8F0;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Soft Alabaster</div>
      <div class="swatch-hex">#F7FAFC</div>
      <div class="swatch-role">Page background</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#FFFFFF; border-bottom: 1px solid #E2E8F0;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Pure White</div>
      <div class="swatch-hex">#FFFFFF</div>
      <div class="swatch-role">Card backgrounds</div>
    </div>
  </div>
</div>
</body>
</html>
